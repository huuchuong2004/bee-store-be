<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kích hoạt tài khoản thành công - LC Store</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --text-main: #ffffff;
            --text-sub: #64748b;
            --accent: #22c55e;        /* Màu xanh lá đại diện cho Sự Kích Hoạt Thành Công */
            --accent-glow: rgba(34, 197, 94, 0.2);
            --font-stack: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            font-family: var(--font-stack);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* BỐ CỤC CHÍNH: KHÔNG DÙNG CARD BAO QUANH */
        .wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* Chia 2 vế trái phải */
            gap: 60px;
            align-items: center;
        }

        /* VẾ TRÁI: NỘI DUNG CHÍNH */
        .content-section {
            animation: slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--accent);
            position: relative;
        }

        p {
            color: #94a3b8;
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 40px;
            max-width: 480px;
        }

        footer {
            margin-top: 60px;
            font-size: 13px;
            color: var(--text-sub);
            border-top: 1px solid #1e293b;
            padding-top: 20px;
        }

        /* VẾ PHẢI: HÌNH ẢNH NỔI BẬT */
        .image-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInRight 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .img-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid #1e293b;
            position: relative;
            z-index: 2;
        }

        /* Hiệu ứng decor trừu tượng phía sau ảnh */
        .img-container::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 100%;
            height: 100%;
            border: 2px dashed #334155;
            border-radius: 30px;
            z-index: 1;
        }

        /* ==== LÀM LẠI BUTTON THEO BỐ CỤC PHÓNG KHOÁNG ==== */
        .uv-link {
            text-decoration: none;
            display: inline-block;
        }

        .uv-btn-container {
            --btn-color: #ffffff;
            --corner-color: rgba(255, 255, 255, 0.15);
            --corner-dist: 16px;
            --corner-multiplier: 1.5;
            --timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration: 300ms;
            position: relative;
        }

        .uv-btn {
            min-width: 240px;
            min-height: 56px;
            border-radius: 14px;
            border: none;
            padding: 0 30px;
            background: var(--btn-color);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
            transition: transform var(--duration) var(--timing-function), background-color var(--duration);
        }

        .uv-btn-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--bg-dark); /* Chữ đen trên nền nút trắng */
        }

        .uv-drawer {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 26px;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ffffff;
            background: var(--accent);
            border-radius: 6px;
            opacity: 0;
            transition: transform calc(0.5 * var(--duration)) ease, opacity calc(0.5 * var(--duration)) ease;
            z-index: 3;
        }
        .uv-transition-top   { top: 0; left: 20px; }
        .uv-transition-bottom{ bottom: 0; right: 20px; }

        .uv-corner {
            position: absolute;
            width: 20px;
            fill: none;
            stroke: var(--corner-color);
            transition: transform var(--duration) var(--timing-function), stroke var(--duration);
        }

        .uv-corner:nth-of-type(1) { top: 0; left: 0; transform: translate(calc(-1 * var(--corner-dist)), calc(-1 * var(--corner-dist))) rotate(90deg); }
        .uv-corner:nth-of-type(2) { top: 0; right: 0; transform: translate(var(--corner-dist), calc(-1 * var(--corner-dist))) rotate(180deg); }
        .uv-corner:nth-of-type(3) { bottom: 0; right: 0; transform: translate(var(--corner-dist), var(--corner-dist)) rotate(-90deg); }
        .uv-corner:nth-of-type(4) { bottom: 0; left: 0; transform: translate(calc(-1 * var(--corner-dist)), var(--corner-dist)) rotate(0deg); }

        /* Hover States */
        .uv-link:hover {
            .uv-btn {
                transform: scale(1.04);
                background: var(--accent);
            }
            .uv-btn-text {
                color: #ffffff;
            }
            .uv-transition-top {
                transform: translateY(-26px);
                opacity: 1;
            }
            .uv-transition-bottom {
                transform: translateY(26px);
                opacity: 1;
            }
            --corner-color: var(--accent);
            .uv-corner:first-of-type { transform: translate(calc(-1 * var(--corner-multiplier) * var(--corner-dist)), calc(-1 * var(--corner-multiplier) * var(--corner-dist))) rotate(90deg); }
            .uv-corner:nth-of-type(2) { transform: translate(calc(var(--corner-multiplier) * var(--corner-dist)), calc(-1 * var(--corner-multiplier) * var(--corner-dist))) rotate(180deg); }
            .uv-corner:nth-of-type(3) { transform: translate(calc(var(--corner-multiplier) * var(--corner-dist)), calc(var(--corner-multiplier) * var(--corner-dist))) rotate(-90deg); }
            .uv-corner:nth-of-type(4) { transform: translate(calc(-1 * var(--corner-multiplier) * var(--corner-dist)), calc(var(--corner-multiplier) * var(--corner-dist))) rotate(0deg); }
        }

        /* ANIMATIONS */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(40px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        /* ĐÁP ỨNG DI ĐỘNG (MOBILE RESPONSIVE) */
        @media (max-width: 768px) {
            .wrapper {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 40px;
                padding: 24px;
            }
            h1 { font-size: 36px; }
            p { margin: 0 auto 32px auto; }
            .image-section { order: -1; } /* Ảnh nhảy lên trên chữ ở mobile */
            .img-container { max-width: 240px; }
            .img-container::before { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- VẾ TRÁI: CHỮ & TEXT -->
    <div class="content-section">
        <div class="badge">
            <span style="display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%"></span>
            Hệ thống kích hoạt
        </div>
        <h1>Tài khoản của bạn<br>đã <span>sẵn sàng.</span></h1>
        <p>Chào mừng bạn gia nhập hệ sinh thái của OUTTA-Store. Quy trình xác thực đã hoàn tất thành công. Bây giờ bạn có thể toàn quyền sử dụng dịch vụ.</p>

        <!-- NÚT UIVERSE PHONG CÁCH MỚI -->
        <a class="uv-link" href="http://localhost:5173/" aria-label="Đăng nhập ngay">
            <div class="uv-btn-container">
                <div class="uv-drawer uv-transition-top">LC-Store</div>
                <div class="uv-drawer uv-transition-bottom">Let's Go</div>

                <button class="uv-btn" type="button">
                    <span class="uv-btn-text">Bắt đầu khám phá</span>
                </button>

                <svg class="uv-corner" xmlns="http://www.w3.org/2000/svg" viewBox="-1 1 32 32"><path d="M32,32C14.355,32,0,17.645,0,0h.985c0,17.102,13.913,31.015,31.015,31.015v.985Z"></path></svg>
                <svg class="uv-corner" xmlns="http://www.w3.org/2000/svg" viewBox="-1 1 32 32"><path d="M32,32C14.355,32,0,17.645,0,0h.985c0,17.102,13.913,31.015,31.015,31.015v.985Z"></path></svg>
                <svg class="uv-corner" xmlns="http://www.w3.org/2000/svg" viewBox="-1 1 32 32"><path d="M32,32C14.355,32,0,17.645,0,0h.985c0,17.102,13.913,31.015,31.015,31.015v.985Z"></path></svg>
                <svg class="uv-corner" xmlns="http://www.w3.org/2000/svg" viewBox="-1 1 32 32"><path d="M32,32C14.355,32,0,17.645,0,0h.985c0,17.102,13.913,31.015,31.015,31.015v.985Z"></path></svg>
            </div>
        </a>

        <footer>Cảm ơn bạn đã tin tưởng lựa chọn LC-Store</footer>
    </div>

    <!-- VẾ PHẢI: LOGO/HÌNH ẢNH TO RÕ RÀNG -->
    <div class="image-section">
        <div class="img-container">
            <img src="https://i.ibb.co/Zzfg4Kwk/unnamed.jpg" alt="LC Store Showcase" />
        </div>
    </div>
</div>

</body>
</html>
