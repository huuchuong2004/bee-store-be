<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BEE Store API Docs</title>

    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">

    <style>
        :root {
            --bg-1: #120f24;
            --bg-2: #1e1b4b;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.18);

            --text: #fff7ed;
            --muted: #fbcfe8;

            --cyan: #67e8f9;
            --blue: #93c5fd;
            --purple: #c4b5fd;
            --pink: #f9a8d4;
            --green: #86efac;
            --red: #fca5a5;
            --yellow: #fde68a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                    radial-gradient(circle at 12% 12%, rgba(249, 168, 212, 0.35), transparent 30%),
                    radial-gradient(circle at 85% 8%, rgba(196, 181, 253, 0.32), transparent 28%),
                    radial-gradient(circle at 50% 90%, rgba(103, 232, 249, 0.22), transparent 35%),
                    linear-gradient(135deg, #120f24, #1e1b4b 55%, #312e81);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                    linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, black, transparent 85%);
        }
        body::after {
            content: "🐝 ✨ 🍯 💛 🌸 🧁";
            position: fixed;
            right: 28px;
            bottom: 22px;
            z-index: 0;
            pointer-events: none;
            font-size: 30px;
            letter-spacing: 10px;
            opacity: 0.18;
            filter: blur(0.1px);
        }

        /* ================= TOP BAR ================= */

        .swagger-ui .topbar {
            padding: 14px 0;
            background: rgba(2, 6, 23, 0.72) !important;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(18px);
            box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
        }

        .swagger-ui .topbar .wrapper {
            max-width: 1400px;
        }

        .swagger-ui .topbar-wrapper img {
            content: url("/img.png");
            width: 44px;
            height: 44px;
            object-fit: contain;
            border-radius: 14px;
            box-shadow: 0 0 28px rgba(34, 211, 238, 0.45);
        }

        .swagger-ui .topbar-wrapper span {
            display: none;
        }

        .swagger-ui .topbar::after {
            content: "";
            position: absolute;
            left: 235px;
            top: 19px;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(90deg, #22d3ee, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .swagger-ui .topbar .download-url-wrapper {
            gap: 10px;
        }

        .swagger-ui .topbar .download-url-wrapper input {
            height: 42px;
            border-radius: 14px 0 0 14px;
            border: 1px solid rgba(34, 211, 238, 0.35);
            background: rgba(15, 23, 42, 0.9);
            color: #e0f2fe;
            font-weight: 700;
            outline: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .swagger-ui .topbar .download-url-wrapper .download-url-button {
            height: 42px;
            border-radius: 0 14px 14px 0;
            border: none;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 0 26px rgba(168, 85, 247, 0.36);
        }

        /* ================= LAYOUT ================= */

        .swagger-ui .wrapper {
            max-width: 1400px;
        }

        .swagger-ui .information-container.wrapper::before {
            content: "🐝 BEE Store Cute Dev Mode ✨";
            display: inline-flex;
            margin-bottom: 18px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(249, 168, 212, 0.45);
            background: linear-gradient(135deg, rgba(249, 168, 212, 0.22), rgba(196, 181, 253, 0.18));
            color: #fdf2f8;
            font-size: 13px;
            font-weight: 1000;
            letter-spacing: 0.02em;
            box-shadow: 0 0 32px rgba(249, 168, 212, 0.22);
        }

        .swagger-ui .info {
            margin: 0;
        }

        .swagger-ui .info .title {
            color: #ffffff;
            font-size: 46px;
            line-height: 1.1;
            font-weight: 1000;
            letter-spacing: -0.055em;
            background: linear-gradient(90deg, #f9a8d4, #fde68a, #86efac, #93c5fd, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
        }

        .swagger-ui .info .title small {
            top: -6px;
            border-radius: 999px;
            padding: 5px 10px;
            background: rgba(34, 211, 238, 0.14);
            border: 1px solid rgba(34, 211, 238, 0.28);
        }

        .swagger-ui .info .title small pre {
            color: #67e8f9;
            font-weight: 900;
        }

        .swagger-ui .info a {
            color: #38bdf8;
            font-weight: 800;
        }

        .swagger-ui .info p,
        .swagger-ui .info li,
        .swagger-ui .info table {
            color: var(--text);
        }

        .swagger-ui .scheme-container {
            margin: 22px auto 0;
            padding: 22px 0;
            background: transparent;
            box-shadow: none;
            border: none;
        }

        .swagger-ui .scheme-container .schemes {
            padding: 18px 22px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.72);
            backdrop-filter: blur(16px);
        }

        .swagger-ui select {
            border-radius: 12px;
            background: rgba(2, 6, 23, 0.8);
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.28);
            font-weight: 700;
        }

        .swagger-ui .btn.authorize {
            border-radius: 999px;
            border: 1px solid rgba(134, 239, 172, 0.58);
            background: linear-gradient(135deg, rgba(134, 239, 172, 0.2), rgba(103, 232, 249, 0.14));
            color: #dcfce7;
            font-weight: 1000;
            box-shadow: 0 0 28px rgba(134, 239, 172, 0.22);
        }

        .swagger-ui .btn.authorize::before {
            content: "🔐 ";
        }

        .swagger-ui .btn.authorize svg {
            fill: #86efac;
        }

        /* ================= FILTER ================= */

        .swagger-ui .filter-container {
            padding: 24px 0 14px;
        }

        .swagger-ui .filter-container input {
            height: 54px;
            border-radius: 18px;
            color: var(--text);
            border: 1px solid rgba(34, 211, 238, 0.38);
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(14px);
            font-size: 15px;
            font-weight: 800;
            box-shadow:
                    inset 0 0 0 1px rgba(255, 255, 255, 0.04),
                    0 0 28px rgba(34, 211, 238, 0.1);
        }

        .swagger-ui .filter-container input::placeholder {
            color: #94a3b8;
        }

        /* ================= TAGS ================= */

        .swagger-ui .opblock-tag-section {
            margin-top: 22px;
        }

        .swagger-ui .opblock-tag {
            padding: 24px 20px 14px;
            color: #f8fafc;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            font-size: 28px;
            font-weight: 1000;
            letter-spacing: -0.04em;
        }

        .swagger-ui .opblock-tag small {
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
        }

        .swagger-ui .opblock-tag svg {
            fill: #cbd5e1;
        }

        /* ================= OPBLOCK ================= */

        .swagger-ui .opblock {
            position: relative;
            overflow: hidden;
            margin: 15px 0;
            border-radius: 26px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.075);
            backdrop-filter: blur(18px);
            box-shadow:
                    0 18px 45px rgba(0, 0, 0, 0.22),
                    inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .swagger-ui .opblock:hover {
            transform: translateY(-3px) scale(1.005);
            box-shadow:
                    0 26px 70px rgba(0, 0, 0, 0.34),
                    0 0 28px rgba(249, 168, 212, 0.16);
            border-color: rgba(249, 168, 212, 0.42);
        }

        .swagger-ui .opblock::before {
            content: "";
            position: absolute;
            inset: 0;
            width: 5px;
            background: linear-gradient(to bottom, var(--cyan), var(--purple), var(--pink));
            opacity: 0.95;
        }

        .swagger-ui .opblock .opblock-summary {
            min-height: 62px;
            padding: 8px 18px 8px 20px;
        }

        .swagger-ui .opblock .opblock-summary-method {
            min-width: 90px;
            padding: 9px 14px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 1000;
            letter-spacing: 0.04em;
            text-shadow: none;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        }

        .swagger-ui .opblock .opblock-summary-path {
            color: #f8fafc;
            font-size: 16px;
            font-weight: 900;
        }

        .swagger-ui .opblock .opblock-summary-path__deprecated {
            color: #f8fafc;
        }

        .swagger-ui .opblock .opblock-summary-description {
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 700;
        }

        .swagger-ui .opblock .opblock-control-arrow svg,
        .swagger-ui .opblock .authorization__btn svg {
            fill: #cbd5e1;
        }

        .swagger-ui .opblock.opblock-get {
            border-color: rgba(147, 197, 253, 0.45);
            background: linear-gradient(135deg, rgba(147, 197, 253, 0.16), rgba(255, 255, 255, 0.06));
        }

        .swagger-ui .opblock.opblock-get .opblock-summary-method {
            background: linear-gradient(135deg, #93c5fd, #67e8f9);
            color: #0f172a;
        }

        .swagger-ui .opblock.opblock-post {
            border-color: rgba(134, 239, 172, 0.45);
            background: linear-gradient(135deg, rgba(134, 239, 172, 0.15), rgba(255, 255, 255, 0.06));
        }

        .swagger-ui .opblock.opblock-post .opblock-summary-method {
            background: linear-gradient(135deg, #86efac, #bbf7d0);
            color: #052e16;
        }

        .swagger-ui .opblock.opblock-put {
            border-color: rgba(253, 230, 138, 0.5);
            background: linear-gradient(135deg, rgba(253, 230, 138, 0.16), rgba(255, 255, 255, 0.06));
        }

        .swagger-ui .opblock.opblock-put .opblock-summary-method {
            background: linear-gradient(135deg, #fde68a, #fbcfe8);
            color: #422006;
        }

        .swagger-ui .opblock.opblock-delete {
            border-color: rgba(252, 165, 165, 0.48);
            background: linear-gradient(135deg, rgba(252, 165, 165, 0.16), rgba(255, 255, 255, 0.06));
        }

        .swagger-ui .opblock.opblock-delete .opblock-summary-method {
            background: linear-gradient(135deg, #fca5a5, #f9a8d4);
            color: #450a0a;
        }

        .swagger-ui .opblock-body {
            border-top: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(2, 6, 23, 0.38);
        }

        /* ================= TEXT INSIDE DETAIL ================= */

        .swagger-ui .opblock-description-wrapper p,
        .swagger-ui .opblock-external-docs-wrapper p,
        .swagger-ui .opblock-title_normal p,
        .swagger-ui .response-col_status,
        .swagger-ui .response-col_description,
        .swagger-ui .parameter__name,
        .swagger-ui .parameter__type,
        .swagger-ui .parameter__deprecated,
        .swagger-ui .parameter__in,
        .swagger-ui table thead tr td,
        .swagger-ui table thead tr th,
        .swagger-ui label,
        .swagger-ui .tab li,
        .swagger-ui .responses-inner h4,
        .swagger-ui .responses-inner h5,
        .swagger-ui .model-title,
        .swagger-ui .models h4,
        .swagger-ui .servers-title {
            color: var(--text) !important;
        }

        .swagger-ui .markdown p,
        .swagger-ui .markdown pre,
        .swagger-ui .renderedMarkdown p {
            color: #cbd5e1;
        }

        .swagger-ui input,
        .swagger-ui textarea {
            border-radius: 12px;
            background: rgba(2, 6, 23, 0.75);
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.25);
        }

        .swagger-ui .btn {
            border-radius: 13px;
            font-weight: 900;
        }

        .swagger-ui .execute-wrapper .btn.execute {
            background: linear-gradient(135deg, #22d3ee, #a855f7);
            border: none;
            color: white;
            box-shadow: 0 0 26px rgba(168, 85, 247, 0.38);
        }

        .swagger-ui .btn.cancel {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fecaca;
        }

        .swagger-ui .btn.try-out__btn {
            border-color: rgba(34, 211, 238, 0.45);
            color: #67e8f9;
            background: rgba(34, 211, 238, 0.08);
        }

        .swagger-ui .responses-table,
        .swagger-ui .parameters-container,
        .swagger-ui .opblock-section-header {
            background: transparent !important;
        }

        .swagger-ui .opblock-section-header {
            box-shadow: none;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .swagger-ui .highlight-code,
        .swagger-ui .microlight {
            border-radius: 16px;
            background: #020617 !important;
        }

        .swagger-ui .model-box {
            background: rgba(15, 23, 42, 0.72);
            border-radius: 16px;
        }

        .swagger-ui section.models {
            margin-top: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.72);
            backdrop-filter: blur(14px);
        }

        .swagger-ui section.models.is-open h4 {
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .swagger-ui .model,
        .swagger-ui .model-toggle:after {
            color: #e5e7eb;
        }

        /* ================= CUSTOM HERO BADGE ================= */

        .swagger-ui .information-container.wrapper::before {
            content: "🚀 Gen Z Developer Mode";
            display: inline-flex;
            margin-bottom: 18px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(34, 211, 238, 0.35);
            background: rgba(34, 211, 238, 0.1);
            color: #67e8f9;
            font-size: 13px;
            font-weight: 1000;
            letter-spacing: 0.02em;
            box-shadow: 0 0 28px rgba(34, 211, 238, 0.13);
        }

        .swagger-ui .information-container.wrapper::after {
            content: "Code xinh, API mượt, bug thì mình fix 💅✨";
            display: block;
            margin-top: 18px;
            color: #fbcfe8;
            font-size: 15px;
            font-weight: 800;
        }

        @media (max-width: 768px) {
            .swagger-ui .topbar::after {
                display: none;
            }

            .swagger-ui .info .title {
                color: #ffffff;
                font-size: 46px;
                line-height: 1.1;
                font-weight: 1000;
                letter-spacing: -0.055em;
                background: linear-gradient(90deg, #f9a8d4, #fde68a, #86efac, #93c5fd, #c4b5fd);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                text-shadow: none;
            }

            .swagger-ui .information-container.wrapper {
                margin: 18px 12px 0;
                padding: 24px;
                border-radius: 24px;
            }

            .swagger-ui .opblock .opblock-summary {
                flex-wrap: wrap;
                gap: 8px;
            }
        }
    </style>
</head>

<body>
<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>

<script>
    window.onload = function () {
        SwaggerUIBundle({
            url: "/v3/api-docs",
            dom_id: "#swagger-ui",
            deepLinking: true,
            persistAuthorization: true,
            docExpansion: "none",
            filter: true,
            defaultModelsExpandDepth: -1,
            syntaxHighlight: {
                activated: true,
                theme: "agate"
            },
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            layout: "StandaloneLayout",
            onComplete: function () {
                setTimeout(function () {
                    const filterInput = document.querySelector(".filter-container input");
                    if (filterInput) {
                        filterInput.placeholder = "Tìm API xinh xinh ở đây nè ✨";
                    }
                }, 300);
            }
        });
    };
</script>
</body>
</html>
