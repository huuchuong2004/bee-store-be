server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: pee-store

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/pee_store_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
